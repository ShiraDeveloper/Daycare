spring.application.name=Daycare
server.port=8585

# Active profile. The "dev" profile exposes the H2 console and relaxes frame
# options for local development only. NEVER run with the dev profile in production.
spring.profiles.active=dev

# Datasource. Credentials should be overridden via environment variables in
# any non-local environment.
spring.datasource.url=jdbc:h2:./DaycareDB2;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=${DB_USERNAME:sa}
spring.datasource.password=${DB_PASSWORD:1234}
spring.jpa.hibernate.ddl-auto=update

# JWT configuration. The signing key MUST be overridden in production via the
# JWT_SECRET environment variable (must be >= 64 bytes for HS512).
jwt.secret=${JWT_SECRET:dev-only-insecure-jwt-secret-change-me-via-JWT_SECRET-env-variable-0123456789}
jwt.expiration-ms=86400000
