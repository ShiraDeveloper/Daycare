spring.application.name=Daycare
server.port=8585

# Active profile. The "dev" profile exposes the H2 console and relaxes frame
# options for local development only. NEVER run with the dev profile in production.
spring.profiles.active=dev

# Datasource. Credentials should be overridden via environment variables in
# any non-local environment.
spring.datasource.url=jdbc:h2:./DaycareDB2;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=${DB_USERNAME:sa}
spring.datasource.password=${DB_PASSWORD:1234}
spring.jpa.hibernate.ddl-auto=update

# JWT configuration. The signing key MUST be overridden in production via the
# JWT_SECRET environment variable (must be >= 64 bytes for HS512).
jwt.secret=${JWT_SECRET:dev-only-insecure-jwt-secret-change-me-via-JWT_SECRET-env-variable-0123456789}
jwt.expiration-ms=86400000

# Directory where uploaded child images are stored (resolved to an absolute path).
app.image-storage-dir=${IMAGE_STORAGE_DIR:images}

# Multipart upload limits.
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=10MB

# Mail (SMTP). Defaults point at a local dev SMTP catcher (e.g. MailHog on 1025).
# Override host/port/credentials via environment variables in real environments.
# Mail sending failures are caught and logged, so missing SMTP never breaks jobs.
spring.mail.host=${MAIL_HOST:localhost}
spring.mail.port=${MAIL_PORT:1025}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${MAIL_SMTP_AUTH:false}
spring.mail.properties.mail.smtp.starttls.enable=${MAIL_SMTP_STARTTLS:false}
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# Daycare notification settings.
app.mail.from=${MAIL_FROM:noreply@daycare.local}
app.mail.educator-fallback=${EDUCATOR_EMAIL:educator@daycare.local}
# Public base URL used to build parent confirmation links.
app.base-url=${APP_BASE_URL:http://localhost:8585}

# Scheduled job cron expressions (second minute hour day month weekday).
app.schedule.morning-attendance=${MORNING_CRON:0 0 9 * * *}
app.schedule.evening-summary=${EVENING_CRON:0 0 17 * * *}
app.schedule.zone=${SCHEDULE_ZONE:Asia/Jerusalem}
